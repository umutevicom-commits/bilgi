name: Soru Havuzu Güncelleme

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-questions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Wikipedia Sorularını Çek ve JSON'a Kaydet
        run: node scripts/fetch-wikipedia-questions.mjs

      - name: Değişiklikleri Commit ve Push Et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/questions.json
          if git diff --cached --quiet; then
            echo "Yeni soru yok, commit atlanıyor."
          else
            git commit -m "chore: soru havuzu güncellendi ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git push
          fi
